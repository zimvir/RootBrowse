[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rootbrowse-mcp"
version = "0.4.0"
description = "A browser for AI agent"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "rootbrowse==0.5.1",
    "mcp>=1.0.0",
]

[project.scripts]
rootbrowse-mcp = "rootbrowse_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["rootbrowse_mcp"]